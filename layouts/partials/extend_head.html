<!-- Anime.js - Moving Letters 依赖 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<!-- Moving Letters 脚本 -->
<script src="/js/moving-letters.js"></script>

<!-- Moving Letters 样式 -->
<style>
/* 通用样式 */
.ml-animation {
  font-weight: 900;
  font-size: 3.5em;
}

.ml-animation .text-wrapper {
  position: relative;
  display: inline-block;
  padding-top: 0.1em;
  padding-right: 0.05em;
  padding-bottom: 0.15em;
}

.ml-animation .letter {
  display: inline-block;
  line-height: 1em;
}

/* ml1 - 带线条展开 */
.ml1 .letter {
  display: inline-block;
  line-height: 1em;
}

.ml1 .text-wrapper {
  position: relative;
  display: inline-block;
  padding-top: 0.2em;
  padding-right: 0.05em;
  padding-bottom: 0.1em;
  overflow: hidden;
}

.ml1 .line {
  opacity: 0;
  position: absolute;
  left: 0;
  height: 2px;
  width: 100%;
  background-color: currentColor;
  transform-origin: 0 0;
}

.ml1 .line1 { top: 0; }
.ml1 .line2 { bottom: 0; }

/* ml2 - 渐显效果 */
.ml2 {
  font-weight: 900;
  font-size: 3.5em;
}

.ml2 .letter {
  display: inline-block;
  line-height: 1em;
}

/* ml3 - 旋转进入 */
.ml3 {
  font-weight: 900;
  font-size: 3.5em;
}

/* ml6 - 推入效果 */
.ml6 {
  position: relative;
  font-weight: 900;
  font-size: 3.3em;
}

.ml6 .text-wrapper {
  position: relative;
  display: inline-block;
  padding-top: 0.2em;
  padding-right: 0.05em;
  padding-bottom: 0.1em;
  overflow: hidden;
}

.ml6 .letter {
  display: inline-block;
  line-height: 1em;
}

/* ml7 - 剪切效果 */
.ml7 {
  position: relative;
  font-weight: 900;
  font-size: 3.4em;
}

.ml7 .text-wrapper {
  position: relative;
  display: inline-block;
  padding-top: 0.2em;
  padding-right: 0.05em;
  padding-bottom: 0.1em;
}

.ml7 .letter {
  transform-origin: 0 100%;
  display: inline-block;
  line-height: 1em;
}

/* ml9 - 变形效果 */
.ml9 {
  position: relative;
  font-weight: 900;
  font-size: 4em;
}

.ml9 .text-wrapper {
  position: relative;
  display: inline-block;
  padding-top: 0.1em;
  padding-right: 0.05em;
  padding-bottom: 0.15em;
}

.ml9 .letter {
  transform-origin: 50% 100%;
  display: inline-block;
  line-height: 1em;
}

/* ml11 - 带顶部线条 */
.ml11 {
  font-weight: 700;
  font-size: 3.8em;
}

.ml11 .text-wrapper {
  position: relative;
  display: inline-block;
  padding-top: 0.3em;
  padding-right: 0.05em;
  padding-bottom: 0.1em;
}

.ml11 .line {
  opacity: 0;
  position: absolute;
  left: 0;
  height: 3px;
  width: 100%;
  background-color: currentColor;
  transform-origin: 100% 100%;
  top: 0;
}

.ml11 .letter {
  display: inline-block;
  line-height: 1em;
  transform-origin: 0 0;
}

/* ml16 - 波浪效果 */
.ml16 {
  position: relative;
  font-weight: 900;
  font-size: 3em;
  text-transform: uppercase;
}

.ml16 .letter {
  display: inline-block;
  line-height: 1em;
}
</style>
