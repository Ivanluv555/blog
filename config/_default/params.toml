colorScheme = "blowfish"
defaultAppearance = "dark"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true
enableImageLazyLoading = true
enableImageWebp = true
enableQuicklink = true

# 性能优化
fingerprintAlgorithm = "sha256"
robots = ""

[header]
  layout = "hybrid" # basic, fixed, fixed-fill, fixed-fill-blur

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "background" # page, profile, hero, card, background, custom
  homepageImage = "/img/background.svg"
  showRecent = true
  showRecentItems = 10
  showMoreLink = true
  showMoreLinkDest = "/posts"
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = true

[article]
  showDate = true
  showViews = false
  showLikes = false
  showDateUpdated = false
  showAuthor = true
  showHero = true
  heroStyle = "background" # basic, big, background, thumbAndBackground
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = true
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  showSummary = true
  showTableOfContents = true
  showRelatedContent = true
  relatedContentLimit = 3
  showTaxonomies = true
  showWordCount = true
  showReadingTime = true
  showComments = false
  sharingLinks = ["facebook", "twitter", "telegram", "whatsapp", "linkedin", "email"]
  showZenMode = true
  seriesOpened = true

[list]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = true
  showBreadcrumbs = true
  showSummary = true
  showViews = false
  showLikes = false
  showTableOfContents = false
  showCards = true
  orderByWeight = false
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false
  constrainItemsWidth = false
  backgroundImageUrl = "/img/background.svg"

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showHero = true
  heroStyle = "background"
  showBreadcrumbs = true
  showViews = false
  showLikes = false
  showTableOfContents = false
  cardView = false
  layoutBackgroundBlur = true
  backgroundImageUrl = "/img/background.svg"

[term]
  showHero = true
  heroStyle = "background"
  showBreadcrumbs = true
  showViews = false
  showLikes = false
  showTableOfContents = true
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = true
  backgroundImageUrl = "/img/background.svg"

# Firebase 集成（可选 - 用于浏览量和点赞）
# 需要启用此功能时，请访问 https://console.firebase.google.com/ 创建项目
# 并将相应的配置值填写到下方，同时在 params.toml 中启用 showViews 和 showLikes
[firebase]
  apiKey = ""
  authDomain = ""
  projectId = ""
  storageBucket = ""
  messagingSenderId = ""
  appId = ""
  measurementId = ""

# Fathom Analytics（可选）
[fathomAnalytics]
  site = ""

# 买咖啡打赏（可选）
[buymeacoffee]
  identifier = ""
  globalWidget = false
  globalWidgetMessage = "Hello"
  globalWidgetColor = "#FFDD00"
  globalWidgetPosition = "Right"

# 验证代码（可选）
[verification]
  google = ""
  bing = ""
  pinterest = ""
  yandex = ""

# 高级功能
[homepage.banner]
  headline = "欢迎来到酒精灯的博客 🚀"
  text = "这里记录技术探索、学习笔记和生活感悟"
  button = "开始阅读"
  buttonDest = "/posts"
