baseURL = 'https://example.org/'
locale = 'zh-cn'
title = '我的个人博客'
theme = 'PaperMod'

[params]
  description = "欢迎来到我的个人博客"
  author = "Your Name"

  # 启用搜索
  enableSearch = true

  # 首页信息
  [params.homeInfoParams]
    Title = "你好 👋"
    Content = "欢迎来到我的个人博客"

  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/"

# 菜单配置
[[menu.main]]
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  name = "文章"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "归档"
  url = "/archives/"
  weight = 3

[[menu.main]]
  name = "标签"
  url = "/tags/"
  weight = 4

[[menu.main]]
  name = "关于"
  url = "/about/"
  weight = 5

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
